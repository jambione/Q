name: Q — Learn

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  q-learn:
    name: Q Learning Loop
    runs-on: ubuntu-latest
    # Only run if the comment body contains a Q signal
    if: |
      contains(github.event.comment.body, '[Q-ACCEPT]') ||
      contains(github.event.comment.body, '[Q-OVERRIDE:') ||
      contains(github.event.comment.body, '[Q-OVERRIDE :')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse Q signal from comment
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"

          # Detect response type
          if echo "$COMMENT" | grep -q '\[Q-ACCEPT\]'; then
            echo "response=accept" >> $GITHUB_OUTPUT
            echo "reason=" >> $GITHUB_OUTPUT
          else
            # Extract reason from [Q-OVERRIDE: reason text here]
            REASON=$(echo "$COMMENT" | grep -oP '(?<=\[Q-OVERRIDE:\s).*?(?=\])' || echo "")
            echo "response=override" >> $GITHUB_OUTPUT
            echo "reason=$REASON" >> $GITHUB_OUTPUT
          fi

          # Extract verdict ID if present in comment (format: Verdict ID: YYYYMMDD-HHMMSS-filename)
          VERDICT_ID=$(echo "$COMMENT" | grep -oP '(?<=Verdict ID: )[A-Za-z0-9_-]+' || echo "unknown-$(date +%Y%m%d-%H%M%S)")
          echo "verdict_id=$VERDICT_ID" >> $GITHUB_OUTPUT

      - name: Run Q learning update
        run: |
          python scripts/q-learn.py \
            --verdict-id "${{ steps.parse.outputs.verdict_id }}" \
            --response "${{ steps.parse.outputs.response }}" \
            --reason "${{ steps.parse.outputs.reason }}"

      - name: Commit updated q-learned.md
        run: |
          git config user.name "Q Conscience"
          git config user.email "q-conscience@noreply"
          git add knowledge_base/team/exceptions/approved.md
          if git diff --staged --quiet; then
            echo "No changes to team exceptions — nothing to commit."
          else
            git commit -m "Q: learning loop update from PR comment [skip ci]"
            git push
          fi

      - name: Post acknowledgment comment
        uses: actions/github-script@v7
        with:
          script: |
            const response = '${{ steps.parse.outputs.response }}';
            const verdictId = '${{ steps.parse.outputs.verdict_id }}';
            const body = response === 'accept'
              ? `[Q-VERDICT-CLOSED: ${verdictId}] — Confirmed wrong. Learning recorded.`
              : `[Q-VERDICT-CLOSED: ${verdictId}] — Exception noted. Q will not re-flag this pattern.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
