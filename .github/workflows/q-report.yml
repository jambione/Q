name: Q Weekly Digest

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: 'Look-back window in days'
        required: false
        default: '7'

jobs:
  digest:
    name: Generate Q weekly digest
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate digest
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          python scripts/q-report.py --days "$DAYS" --output reports/q-weekly-$(date +%Y-%m-%d).md
          python scripts/q-report.py --days "$DAYS"

      - name: Commit report
        run: |
          git config user.name "Q Conscience Bot"
          git config user.email "q-bot@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: Q weekly digest $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post digest as issue comment (optional)
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().slice(0, 10);
            const reportPath = `reports/q-weekly-${today}.md`;
            if (!fs.existsSync(reportPath)) {
              console.log('No report file found, skipping issue post.');
              return;
            }
            const body = fs.readFileSync(reportPath, 'utf8');
            // Find or create the weekly digest tracking issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'q-digest',
              state: 'open',
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Q Weekly Digest',
                body,
                labels: ['q-digest'],
              });
            }
